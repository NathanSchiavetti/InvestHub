version: "3.9"

services:
  # ─── Banco de dados PostgreSQL ───
  db:
    image: postgres:16-alpine
    container_name: dicas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       dicas_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dicas_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── API Haskell/Servant ───
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dicas_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     dicas_db
      DB_USER:     postgres
      DB_PASSWORD: postgres

volumes:
  postgres_data:
